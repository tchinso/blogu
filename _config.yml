title: "NyanKat's blog"
description: "냥캣의 블로그"
lang: "ko"
timezone: "Asia/Seoul"

url: "https://tchinso.github.io"
baseurl: "/blogu"

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

collections:
  blog:
    output: true
    permalink: /posts/:name/

defaults:
  - scope:
      path: ""
      type: "blog"
    values:
      layout: "post"
      thumbnail: "assets/images/profile/mascot.png"
  - scope:
      path: ""
    values:
      layout: "default"

default_thumbnail: "assets/images/profile/mascot.png"

exclude:
  - docs/
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - README.md
  - scripts/
  - wrangler.toml
  - .codex-preview/
  - _site/
