title: "Paint Heart Atelier"
description: "GitHub PagesмҷҖ JekyllлЎң мҡҙмҳҒн•ҳлҠ” лІҲнҳёнҳ• н•‘нҒ¬ лӢӨмқҙм–ҙлҰ¬ лё”лЎңк·ё"
lang: "ko"
timezone: "Asia/Seoul"

url: "https://syk04403.github.io"
baseurl: ""

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

collections:
  blog:
    output: true
    permalink: /posts/:name/

defaults:
  - scope:
      path: ""
      type: "blog"
    values:
      layout: "post"
      thumbnail: "/assets/images/profile/mascot.png"
  - scope:
      path: ""
    values:
      layout: "default"

default_thumbnail: "/assets/images/profile/mascot.png"

exclude:
  - docs/
  - node_modules/
  - package.json
  - package-lock.json
  - Gemfile
  - Gemfile.lock
  - README.md
  - .codex-preview/
  - _site/
